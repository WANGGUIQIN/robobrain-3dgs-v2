# RoboBrain-3DGS LoRA 3-Epoch Run — A100 80GB
#
# Promoted from train_lora_a100_sanity.yaml after the 1-epoch sanity proved:
#   - lm_loss converged in <2000 steps (template memorization is easy)
#   - render_loss settled at 0.5-0.85 (didn't really converge — needs more time)
#   - LoRA showed signal vs base: action_EM +5pp, task_keyword +16pp,
#     affordance_uv MAE -7%, hint_specificity +3% (analysis_plan_quality/scores.md)
#
# Only delta vs sanity: num_epochs 1 → 3, save_steps 200 → 500 (less disk churn
# over 39957 total steps), eval_steps 100 → 250, output_dir suffix.
#
# Single-GPU (recommended given GPU 0 is shared with another user):
#   CUDA_VISIBLE_DEVICES=1 python train.py --config config/train_lora_a100_3epoch.yaml
# Multi-GPU (only if both A100s are fully free):
#   deepspeed --num_gpus=2 train.py --config config/train_lora_a100_3epoch.yaml
#
# Expected wall-clock: ~14h on single A100 80GB (1.1s/step × 39957 steps / 3600).

# === Model ===
model:
  base_model: "/home/edge/RoboBrain/models/RoboBrain2.5-8B-NV"
  num_gaussians: 1024
  sh_degree: 2
  num_gs_tokens: 64
  gs_encoder_dim: 512
  freeze_vision_encoder: true
  predict_uncertainty: true
  torch_dtype: "bfloat16"

# === Fine-tuning Mode ===
finetune_mode: "lora"

# === LoRA Configuration ===
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "o_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

# === Prompt (Qwen3-VL chat template) ===
prompt:
  system_prompt: >-
    You are RoboBrain, an embodied AI assistant specialized in robotic
    manipulation. Given an image of a scene with 3D spatial understanding,
    provide precise affordance predictions and manipulation constraints.
  disable_system_prompt: false
  max_seq_length: 512

# === Data ===
data:
  unified_root: "/home/edge/RoboBrain/w50037733/data/processed"
  unified_datasets: null              # null = all 7 available datasets (~27K eps)
  unified_task_type: "affordance"
  image_size: 256
  camera: "front"
  max_frames: -1                      # -1 = use all episodes

# === Training (single A100 80GB, GPU 1) ===
training:
  output_dir: "/home/edge/RoboBrain/outputs/lora_3epoch"
  num_epochs: 3                       # 3x signal vs sanity
  per_device_batch_size: 2            # safe under shared A100
  gradient_accumulation_steps: 16     # effective batch = 1 * 2 * 16 = 32 (same as sanity 2-GPU run)
  learning_rate: 2.0e-4               # LoRA adapter LR
  lr_3d_branch: 1.0e-3                # 3D branch LR
  weight_decay: 0.01
  warmup_ratio: 0.05
  max_grad_norm: 1.0
  logging_steps: 10
  save_steps: 500                     # ~13min per save at 1.1s/step
  eval_steps: 250
  seed: 42

# === Rendering Loss ===
rendering_loss:
  enabled: true
  render_size: 64                     # safer than 128 on shared A100
  lambda_l1: 0.8
  lambda_ssim: 0.2
  lambda_depth: 0.5
  lambda_opacity: 0.01
  lambda_uncertainty: 0.1
  weight: 0.3

# === Checkpoint ===
checkpoint:
  keep_last_n: 3
  save_optimizer_state: true

# === DeepSpeed ===
deepspeed:
  config: "config/deepspeed_zero2.json"
