# RoboBrain-3DGS LoRA 3-Epoch Run — PLANNING task type
#
# FIX for the data pipeline bug discovered in the prior train_lora_a100_3epoch run:
#   - data/unified_loader._make_affordance_target() was a stub returning a single
#     hardcoded string for ALL 26K samples. With unified_task_type="affordance",
#     the model was trained on constant garbage and the affordance UV head
#     collapsed to (0.5, 0.5) by 3 epochs.
#   - Fix: unified_task_type → "planning" routes the loader through
#     _load_plan_target() which reads each episode's plan.json and emits a
#     structured Scene/Step/affordance_hint/UV/constraints/done_when target.
#   - This also routes train_step to use PLANNING_SYSTEM_PROMPT, matching
#     inference exactly.
#
# Train-vs-inference alignment (now matches):
#   - system_prompt: PLANNING_SYSTEM_PROMPT (both)
#   - user template: planning-augmented (both)
#   - target: real plan.json content (matches what inference outputs)
#
# Hardware: 2x A100 80GB shared (GPU 1 has a light kailong process ~6 GB)
# Launch:
#   deepspeed --num_gpus=2 train.py --config config/train_lora_a100_planning_3epoch.yaml
#
# Expected wall-clock: ~12-14h on 2x A100 80GB.

# === Model ===
model:
  base_model: "/home/edge/RoboBrain/models/RoboBrain2.5-8B-NV"
  num_gaussians: 1024
  sh_degree: 2
  num_gs_tokens: 64
  gs_encoder_dim: 512
  freeze_vision_encoder: true
  predict_uncertainty: true
  torch_dtype: "bfloat16"

# === Fine-tuning Mode ===
finetune_mode: "lora"

# === LoRA Configuration ===
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "o_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

# === Prompt (Qwen3-VL chat template) ===
# Note: when unified_task_type="planning", train_step routes to PLANNING_SYSTEM_PROMPT
# (utils/prompt_utils.py) which overrides this default. This system_prompt below is
# only used if the per-sample task_type happens to NOT be "planning".
prompt:
  system_prompt: >-
    You are RoboBrain, an embodied AI assistant specialized in robotic
    manipulation. Given an image of a scene with 3D spatial understanding,
    provide precise affordance predictions and manipulation constraints.
  disable_system_prompt: false
  max_seq_length: 4096               # ★ V2 reasoning-first targets push p99 to ~2700 tok; 4096 covers p99.7

# === Data ===
data:
  unified_root: "/home/edge/RoboBrain/w50037733_v2/data/processed"  # V2 plans live here (w50037733 still has V1 plans)
  unified_datasets: null              # null = all 7 available datasets (~27K eps)
  unified_task_type: "planning"       # ★ FIX: was "affordance" which used a stub target
  image_size: 256
  camera: "front"
  max_frames: -1                      # -1 = use all episodes

# === Training (2x A100 80GB, DeepSpeed ZeRO-2) ===
training:
  output_dir: "/home/edge/RoboBrain/outputs/lora_planning_3epoch"
  num_epochs: 3
  per_device_batch_size: 2            # try 2 first; falls back to 1 if OOM (see launch script)
  gradient_accumulation_steps: 8      # 2 GPU × 2 × 8 = effective 32
  learning_rate: 2.0e-4
  lr_3d_branch: 1.0e-3
  weight_decay: 0.01
  warmup_ratio: 0.05
  max_grad_norm: 1.0
  logging_steps: 10
  save_steps: 500
  eval_steps: 250
  seed: 42

# === Rendering Loss ===
rendering_loss:
  enabled: true
  render_size: 64
  lambda_l1: 0.8
  lambda_ssim: 0.2
  lambda_depth: 0.5
  lambda_opacity: 0.01
  lambda_uncertainty: 0.1
  weight: 0.3

# === Checkpoint ===
checkpoint:
  keep_last_n: 100                    # ★ keep all ckpts so epoch-1/2/3 boundaries survive
  save_optimizer_state: true

# === DeepSpeed ===
deepspeed:
  config: "config/deepspeed_zero2.json"
